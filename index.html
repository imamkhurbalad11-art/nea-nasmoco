<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi NEA Nasmoco</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f4f7f6; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe id="neaFrame" src="" allow="geolocation; camera; microphone" style="width: 100%; height: 100%; border: none;"></iframe>

    <script>
        // 1. Ambil parameter dari URL (misal: ?p=Instruktur)
        const urlParams = new URLSearchParams(window.location.search);
        const page = urlParams.get('p') || 'Index';

        // 2. GANTI LINK DI BAWAH INI DENGAN URL WEB APP GOOGLE SCRIPT ANDA
        const gasUrl = "https://script.google.com/macros/s/AKfycbz2PRl4DgX_LSVNV6g1L4lirC8ab2Y96kkU8A9fatpjjX031_0XrnPpuzIQwFUv3TvHNg/exec";

        // 3. Gabungkan link dengan parameter yang sesuai
        const finalUrl = gasUrl + "?p=" + page;

        // 4. Masukkan ke dalam Iframe
        document.getElementById('neaFrame').src = finalUrl;
    </script>
</body>
</html>
